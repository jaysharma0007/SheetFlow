<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetFlow — Dashboard Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <!-- Lucide Icons & SortableJS -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="dashboard-body">
    
    <!-- Dashboard Launcher Container -->
    <main class="launcher-container" id="launcherContainer">
        
        <!-- Final Supreme Header (Absolute OS Layout) -->
        <header class="supreme-header">
            <!-- Left: Identity Capsule -->
            <div class="identity-capsule glass">
                <i data-lucide="layers" class="brand-icon"></i>
                <span class="brand-name">SheetFlow</span>
                <div class="capsule-sep"></div>
                <span class="user-badge">JAY SUTHAR</span>
            </div>

            <!-- Center: Command Hub -->
            <div class="command-hub glass" id="mainSearchTrigger">
                <i data-lucide="search"></i>
                <span class="search-placeholder">Spotlight Search...</span>
                <kbd>⌘K</kbd>
            </div>

            <!-- Right: System Compact Toggle (Mobile Optimized) -->
            <div class="system-cycle-wrapper glass">
                <button class="cycle-action-btn" id="themeCycleBtn" title="Cycle Theme">
                    <i data-lucide="moon"></i>
                </button>
            </div>
        </header>

        <!-- Central Branding (macOS Desktop Centerpiece) -->
        <div class="central-branding-container">
            <div class="logo">
                <i data-lucide="layers" class="logo-icon"></i>
                <span>SheetFlow</span>
            </div>
        </div>

        <!-- App Dock (Bottom Floating Bar) -->
        <div class="app-dock-wrapper glass">
            <div class="app-grid" id="appGrid">
            <!-- Core Tools -->
            <div class="app-item" data-app="dashboard">
                <div class="app-icon glass">
                    <i data-lucide="layout"></i>
                </div>
                <span class="app-label">Dashboard</span>
            </div>

            <div class="app-item" data-app="orders">
                <div class="app-icon glass">
                    <i data-lucide="shopping-cart"></i>
                </div>
                <span class="live-badge">12</span>
                <span class="app-label">Orders</span>
            </div>

            <div class="app-item" data-app="customers">
                <div class="app-icon glass">
                    <i data-lucide="users"></i>
                </div>
                <span class="app-label">Customers</span>
            </div>

            <div class="app-item" data-app="inventory">
                <div class="app-icon glass">
                    <i data-lucide="boxes"></i>
                </div>
                <span class="live-badge status-alert">Low</span>
                <span class="app-label">Inventory</span>
            </div>

            <div class="app-item" data-app="invoices">
                <div class="app-icon glass">
                    <i data-lucide="file-text"></i>
                </div>
                <span class="app-label">Invoices</span>
            </div>

            <div class="app-item" data-app="reports">
                <div class="app-icon glass">
                    <i data-lucide="trending-up"></i>
                </div>
                <span class="app-label">Reports</span>
            </div>

            <!-- macOS Style Divider -->
            <div class="dock-divider"></div>

            <!-- System Modules -->
            <div class="app-item" data-app="apps">
                <div class="app-icon glass">
                    <i data-lucide="grid"></i>
                </div>
                <span class="app-label">Apps</span>
            </div>

            <div class="app-item" data-app="settings">
                <div class="app-icon glass">
                    <i data-lucide="settings"></i>
                </div>
                <span class="app-label">Settings</span>
            </div>
            </div>
        </div>

    </main>

    <!-- Spotlight Search Modal -->
    <div class="spotlight-overlay" id="spotlightModal">
        <div class="spotlight-container glass">
            <div class="spotlight-header">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="spotlightInput" placeholder="Search apps, orders, customers..." autocomplete="off">
                <div class="search-hint">CMD + K</div>
            </div>
            <div class="spotlight-results" id="spotlightResults">
                <!-- Dynamic Search Results -->
            </div>
        </div>
    </div>

    <!-- App Viewport Overlay (For Opening Animation) -->
    <div class="app-viewport" id="appViewport">
        <div class="app-content-container" id="appContent">
            <!-- Module Content Loads Here -->
        </div>
    </div>

    <!-- GSAP for High-end Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
