<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SheetFlow — Dashboard Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <!-- Lucide Icons & SortableJS -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
</head>
<body class="dashboard-body">
    
    <!-- Dashboard Launcher Container -->
    <main class="launcher-container" id="launcherContainer">
        <!-- Segmented Theme Toggle (OS Style) -->
        <div class="theme-segmented-control glass">
            <div class="theme-slider" id="themeSlider"></div>
            <button class="theme-segment" data-theme="dark-mode" title="Dark Mode">
                <i data-lucide="moon" class="theme-icon"></i>
            </button>
            <button class="theme-segment" data-theme="light-mode" title="Light Mode">
                <i data-lucide="sun" class="theme-icon"></i>
            </button>
            <button class="theme-segment" data-theme="neon-mode" title="Neon Mode">
                <i data-lucide="zap" class="theme-icon"></i>
            </button>
        </div>

        <!-- Central Branding (macOS Desktop Centerpiece) -->
        <div class="central-branding-container">
            <header class="launcher-header">
                <div class="logo">
                    <i data-lucide="layers" class="logo-icon"></i>
                    <span>SheetFlow</span>
                </div>
            </header>
        </div>

        <!-- App Dock (Bottom Floating Bar) -->
        <div class="app-dock-wrapper glass">
            <div class="app-grid" id="appGrid">
            <!-- Dashboard -->
            <div class="app-item" data-app="dashboard">
                <div class="app-icon glass">
                    <i data-lucide="layout"></i>
                </div>
                <span class="app-label">Home</span>
            </div>

            <!-- Apps Explorer -->
            <div class="app-item" data-app="apps">
                <div class="app-icon glass">
                    <i data-lucide="shapes"></i>
                </div>
                <span class="app-label">Apps</span>
            </div>

            <!-- Business Orders -->
            <div class="app-item" data-app="orders">
                <div class="app-icon glass">
                    <i data-lucide="shopping-bag"></i>
                    <span class="live-badge">12</span>
                </div>
                <span class="app-label">Orders</span>
            </div>

            <!-- Client CRM -->
            <div class="app-item" data-app="customers">
                <div class="app-icon glass">
                    <i data-lucide="contact-2"></i>
                </div>
                <span class="app-label">Clients</span>
            </div>

            <!-- Warehouse Inventory -->
            <div class="app-item" data-app="inventory">
                <div class="app-icon glass">
                    <i data-lucide="container"></i>
                    <span class="live-badge status-alert">Low</span>
                </div>
                <span class="app-label">Stock</span>
            </div>

            <!-- Finance Invoices -->
            <div class="app-item" data-app="invoices">
                <div class="app-icon glass">
                    <i data-lucide="receipt"></i>
                </div>
                <span class="app-label">Invoices</span>
            </div>

            <!-- Intelligence Reports -->
            <div class="app-item" data-app="reports">
                <div class="app-icon glass">
                    <i data-lucide="pie-chart"></i>
                </div>
                <span class="app-label">Reports</span>
            </div>

            <!-- System Settings -->
            <div class="app-item" data-app="settings">
                <div class="app-icon glass">
                    <i data-lucide="command"></i>
                </div>
                <span class="app-label">Settings</span>
            </div>
            </div>
        </div>

        <!-- Signature (Top-Right, next to Toggle) -->
        <footer class="launcher-footer">
            <p>Made by Jay Suthar</p>
        </footer>
    </main>

    <!-- Spotlight Search Modal -->
    <div class="spotlight-overlay" id="spotlightModal">
        <div class="spotlight-container glass">
            <div class="spotlight-header">
                <i data-lucide="search" class="search-icon"></i>
                <input type="text" id="spotlightInput" placeholder="Search apps, orders, customers..." autocomplete="off">
                <div class="search-hint">CMD + K</div>
            </div>
            <div class="spotlight-results" id="spotlightResults">
                <!-- Dynamic Search Results -->
            </div>
        </div>
    </div>

    <!-- App Viewport Overlay (For Opening Animation) -->
    <div class="app-viewport" id="appViewport">
        <button class="back-btn" id="backBtn">
            <i data-lucide="chevron-left"></i>
            <span>Back to Home</span>
        </button>
        <div class="app-content-container" id="appContent">
            <!-- Module Content Loads Here -->
        </div>
    </div>

    <!-- GSAP for High-end Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
